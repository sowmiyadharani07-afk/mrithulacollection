<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Account – Mrithula Collection</title>
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;500;600;700;800;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --primary:#e63946; --primary-dark:#c1121f; --primary-light:#ff6b6b;
      --accent:#f4a261; --accent2:#2ec4b6;
      --dark:#1a1a2e; --dark2:#16213e; --mid:#6b7280;
      --light:#f0f4ff; --white:#ffffff; --cream:#fafbff;
      --font-head:'League Spartan',sans-serif; --font-body:'Poppins',sans-serif;
    }
    body { font-family:var(--font-body); background:var(--cream); min-height:100vh; display:flex; flex-direction:column; }
    a { text-decoration:none; color:inherit; }
    button { cursor:pointer; border:none; background:none; font-family:var(--font-body); }

    /* ANNOUNCE */
    .announce-bar { background:var(--primary); color:rgba(255,255,255,.92); font-size:11px; letter-spacing:1.5px; text-transform:uppercase; text-align:center; padding:9px 20px; font-weight:500; }
    .announce-bar b { color:var(--white); font-weight:700; }

    /* HEADER */
    header { background:var(--dark); border-bottom:2px solid var(--primary); position:sticky; top:0; z-index:100; }
    .header-inner { max-width:1300px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; padding:0 40px; height:68px; }
    .logo-name { font-family:var(--font-head); font-size:22px; font-weight:800; color:var(--white); letter-spacing:3px; text-transform:uppercase; line-height:1; }
    .logo-tag { font-size:8px; letter-spacing:4px; color:var(--accent); text-transform:uppercase; font-weight:500; font-family:var(--font-body); }
    .hright { display:flex; align-items:center; gap:20px; }
    .hlink { font-size:11px; letter-spacing:1.2px; text-transform:uppercase; color:rgba(255,255,255,.55); font-family:var(--font-head); font-weight:600; display:flex; align-items:center; gap:7px; transition:color .3s; }
    .hlink:hover { color:var(--primary-light); }
    .btn-logout { background:rgba(230,57,70,.15); color:var(--primary-light); border:1px solid rgba(230,57,70,.3); padding:8px 16px; border-radius:5px; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; font-family:var(--font-head); font-weight:700; transition:all .3s; display:flex; align-items:center; gap:7px; }
    .btn-logout:hover { background:var(--primary); color:var(--white); }

    /* PAGE */
    .page-wrap { max-width:1100px; margin:0 auto; padding:48px 24px; flex:1; }

    /* WELCOME BANNER */
    .welcome-banner { background:var(--dark); border-radius:12px; padding:32px 40px; margin-bottom:36px; display:flex; align-items:center; justify-content:space-between; border:1px solid rgba(230,57,70,.2); position:relative; overflow:hidden; }
    .welcome-banner::before { content:''; position:absolute; right:-40px; top:-40px; width:200px; height:200px; background:radial-gradient(circle, rgba(230,57,70,.15) 0%, transparent 70%); border-radius:50%; }
    .wb-left {}
    .wb-greeting { font-family:var(--font-head); font-size:13px; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,.4); margin-bottom:6px; }
    .wb-name { font-family:var(--font-head); font-size:clamp(24px,3vw,34px); font-weight:900; color:var(--white); }
    .wb-name span { color:var(--primary); }
    .wb-meta { font-size:11px; color:rgba(255,255,255,.3); margin-top:8px; display:flex; gap:18px; }
    .wb-meta i { color:var(--primary); margin-right:5px; }
    .wb-avatar { width:72px; height:72px; background:var(--primary); border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:var(--font-head); font-size:28px; font-weight:900; color:var(--white); flex-shrink:0; box-shadow:0 8px 24px rgba(230,57,70,.4); }

    /* STATS */
    .stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:36px; }
    .stat-card { background:var(--white); border-radius:10px; padding:24px; border:1px solid #e8eaf0; display:flex; align-items:center; gap:16px; transition:box-shadow .3s; }
    .stat-card:hover { box-shadow:0 8px 24px rgba(0,0,0,.08); }
    .stat-icon { width:48px; height:48px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
    .stat-icon.red { background:rgba(230,57,70,.1); color:var(--primary); }
    .stat-icon.teal { background:rgba(46,196,182,.1); color:var(--accent2); }
    .stat-icon.orange { background:rgba(244,162,97,.1); color:var(--accent); }
    .stat-val { font-family:var(--font-head); font-size:28px; font-weight:900; color:var(--dark); line-height:1; }
    .stat-lbl { font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--mid); font-weight:500; margin-top:4px; }

    /* SECTION HEADING */
    .sec-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
    .sec-title { font-family:var(--font-head); font-size:20px; font-weight:800; color:var(--dark); display:flex; align-items:center; gap:10px; }
    .sec-title i { color:var(--primary); font-size:16px; }

    /* ORDERS */
    .orders-list { display:flex; flex-direction:column; gap:16px; }

    .order-card { background:var(--white); border-radius:10px; border:1px solid #e8eaf0; overflow:hidden; transition:box-shadow .3s; }
    .order-card:hover { box-shadow:0 6px 20px rgba(0,0,0,.07); }

    .order-head { display:flex; align-items:center; justify-content:space-between; padding:18px 24px; border-bottom:1px solid #f0f2f8; background:#fafbff; flex-wrap:wrap; gap:12px; }
    .order-id { font-family:var(--font-head); font-size:13px; font-weight:700; color:var(--dark); }
    .order-date { font-size:11px; color:var(--mid); }
    .order-status { padding:5px 12px; border-radius:20px; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; font-weight:700; font-family:var(--font-head); }
    .status-placed { background:#fef3c7; color:#92400e; }
    .status-processing { background:#dbeafe; color:#1e40af; }
    .status-shipped { background:#d1fae5; color:#065f46; }
    .status-delivered { background:#f0fdf4; color:#15803d; border:1px solid #86efac; }
    .status-cancelled { background:#fee2e2; color:#991b1b; }

    .order-body { padding:20px 24px; display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
    .order-img { width:72px; height:72px; object-fit:cover; border-radius:8px; border:1px solid #eee; flex-shrink:0; background:#f0f4ff; }
    .order-img-placeholder { width:72px; height:72px; border-radius:8px; background:var(--light); display:flex; align-items:center; justify-content:center; font-size:22px; color:var(--mid); flex-shrink:0; }
    .order-details { flex:1; }
    .order-name { font-family:var(--font-head); font-size:15px; font-weight:700; color:var(--dark); margin-bottom:4px; }
    .order-meta { font-size:11px; color:var(--mid); display:flex; gap:14px; flex-wrap:wrap; }
    .order-meta span { display:flex; align-items:center; gap:4px; }
    .order-price { font-family:var(--font-head); font-size:18px; font-weight:800; color:var(--primary); }

    .order-foot { padding:14px 24px; border-top:1px solid #f0f2f8; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }
    .btn-track { background:var(--dark); color:var(--white); padding:10px 20px; border-radius:5px; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; font-family:var(--font-head); font-weight:700; display:flex; align-items:center; gap:8px; transition:all .3s; }
    .btn-track:hover { background:var(--primary); transform:translateY(-1px); }
    .btn-reorder { background:rgba(230,57,70,.08); color:var(--primary); padding:10px 20px; border-radius:5px; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; font-family:var(--font-head); font-weight:700; display:flex; align-items:center; gap:8px; transition:all .3s; border:1px solid rgba(230,57,70,.2); }
    .btn-reorder:hover { background:var(--primary); color:var(--white); }

    /* EMPTY STATE */
    .empty-state { background:var(--white); border-radius:12px; padding:80px 40px; text-align:center; border:1px solid #e8eaf0; }
    .empty-icon { font-size:56px; color:#dde1f0; margin-bottom:20px; }
    .empty-title { font-family:var(--font-head); font-size:22px; font-weight:800; color:var(--dark); margin-bottom:10px; }
    .empty-sub { font-size:13px; color:var(--mid); margin-bottom:28px; line-height:1.7; }
    .btn-shop { background:var(--primary); color:var(--white); padding:14px 32px; border-radius:6px; font-size:11px; letter-spacing:2px; text-transform:uppercase; font-family:var(--font-head); font-weight:700; display:inline-flex; align-items:center; gap:10px; transition:all .3s; }
    .btn-shop:hover { background:var(--primary-dark); transform:translateY(-2px); box-shadow:0 8px 24px rgba(230,57,70,.35); }

    /* PROFILE SECTION */
    .profile-card { background:var(--white); border-radius:10px; padding:32px; border:1px solid #e8eaf0; margin-top:32px; }
    .profile-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:20px; }
    .profile-field { }
    .pf-label { font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--mid); font-weight:600; margin-bottom:5px; font-family:var(--font-head); }
    .pf-value { font-size:14px; color:var(--dark); font-weight:500; padding:12px 16px; background:var(--light); border-radius:6px; }

    @media(max-width:768px) {
      .header-inner { padding:0 20px; }
      .welcome-banner { padding:24px; flex-direction:column; gap:20px; align-items:flex-start; }
      .stats-row { grid-template-columns:1fr; }
      .profile-grid { grid-template-columns:1fr; }
      .page-wrap { padding:28px 16px; }
    }
  </style>
</head>
<body>

<div class="announce-bar">Free shipping above <b>₹999</b> &nbsp;·&nbsp; Code <b>MRITHULA10</b> for 10% off</div>

<header>
  <div class="header-inner">
    <a href="index.html" style="display:flex;flex-direction:column;align-items:center;">
      <span class="logo-name">Mrithula</span>
      <span class="logo-tag">Collection</span>
    </a>
    <div class="hright">
      <a href="index.html" class="hlink"><i class="fas fa-store"></i> Store</a>
      <button class="btn-logout" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
  </div>
</header>

<div class="page-wrap">

  <!-- WELCOME -->
  <div class="welcome-banner">
    <div class="wb-left">
      <div class="wb-greeting">Welcome back</div>
      <div class="wb-name" id="wbName">Loading...</div>
      <div class="wb-meta">
        <span><i class="fas fa-envelope"></i><span id="wbEmail">—</span></span>
        <span><i class="fas fa-phone"></i><span id="wbPhone">—</span></span>
        <span><i class="fas fa-calendar"></i>Joined <span id="wbJoined">—</span></span>
      </div>
    </div>
    <div class="wb-avatar" id="wbAvatar">?</div>
  </div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-icon red"><i class="fas fa-shopping-bag"></i></div>
      <div><div class="stat-val" id="statTotal">0</div><div class="stat-lbl">Total Orders</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon teal"><i class="fas fa-truck"></i></div>
      <div><div class="stat-val" id="statShipped">0</div><div class="stat-lbl">Shipped</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon orange"><i class="fas fa-check-circle"></i></div>
      <div><div class="stat-val" id="statDelivered">0</div><div class="stat-lbl">Delivered</div></div>
    </div>
  </div>

  <!-- ORDERS -->
  <div class="sec-head">
    <div class="sec-title"><i class="fas fa-receipt"></i> My Orders</div>
  </div>
  <div class="orders-list" id="ordersList"></div>

  <!-- PROFILE -->
  <div class="profile-card">
    <div class="sec-title"><i class="fas fa-user-circle"></i> My Profile</div>
    <div class="profile-grid" id="profileGrid"></div>
  </div>

</div>

<script>
  // ── SESSION CHECK ──
  const session = JSON.parse(localStorage.getItem('mc_session') || 'null');
  if (!session) window.location.href = 'login.html';

  function doLogout() {
    localStorage.removeItem('mc_session');
    window.location.href = 'login.html';
  }

  // ── LOAD USER ──
  function loadPage() {
    if (!session) return;

    // Welcome banner
    document.getElementById('wbName').innerHTML = `${session.firstName} <span>${session.lastName}</span>`;
    document.getElementById('wbEmail').textContent = session.email;
    document.getElementById('wbPhone').textContent = session.phone || '—';
    document.getElementById('wbJoined').textContent = session.joinedDate || '—';
    document.getElementById('wbAvatar').textContent = session.firstName[0].toUpperCase();

    // Profile
    const pg = document.getElementById('profileGrid');
    const fields = [
      { label:'First Name', val:session.firstName },
      { label:'Last Name', val:session.lastName },
      { label:'Email Address', val:session.email },
      { label:'Phone Number', val:session.phone||'—' },
      { label:'Member Since', val:session.joinedDate||'—' },
      { label:'Account Status', val:'✅ Active' },
    ];
    pg.innerHTML = fields.map(f=>`<div class="profile-field"><div class="pf-label">${f.label}</div><div class="pf-value">${f.val}</div></div>`).join('');

    // Orders
    const orders = JSON.parse(localStorage.getItem('mc_orders_' + session.email) || '[]');
    const total = orders.length;
    const shipped = orders.filter(o=>o.status==='Shipped').length;
    const delivered = orders.filter(o=>o.status==='Delivered').length;
    document.getElementById('statTotal').textContent = total;
    document.getElementById('statShipped').textContent = shipped;
    document.getElementById('statDelivered').textContent = delivered;

    const list = document.getElementById('ordersList');
    if (!orders.length) {
      list.innerHTML = `<div class="empty-state">
        <div class="empty-icon"><i class="fas fa-shopping-bag"></i></div>
        <div class="empty-title">No Orders Yet</div>
        <div class="empty-sub">You haven't placed any orders yet.<br>Start shopping to see your orders here!</div>
        <a href="index.html" class="btn-shop"><i class="fas fa-store"></i> Start Shopping</a>
      </div>`;
      return;
    }

    list.innerHTML = orders.slice().reverse().map(o => {
      const statusClass = {
        'Placed':'status-placed','Processing':'status-processing',
        'Shipped':'status-shipped','Delivered':'status-delivered','Cancelled':'status-cancelled'
      }[o.status] || 'status-placed';

      return `<div class="order-card">
        <div class="order-head">
          <div>
            <div class="order-id">Order #${o.orderId}</div>
            <div class="order-date">${o.date}</div>
          </div>
          <span class="order-status ${statusClass}">${o.status}</span>
        </div>
        <div class="order-body">
          <div class="order-img-placeholder"><i class="fas fa-tshirt"></i></div>
          <div class="order-details">
            <div class="order-name">${o.product}</div>
            <div class="order-meta">
              <span><i class="fas fa-ruler"></i> Size: ${o.size||'N/A'}</span>
              <span><i class="fas fa-box"></i> Qty: ${o.qty||1}</span>
              ${o.courierName ? `<span><i class="fas fa-truck"></i> ${o.courierName}</span>` : ''}
              ${o.trackingId ? `<span><i class="fas fa-barcode"></i> ${o.trackingId}</span>` : ''}
            </div>
          </div>
          <div class="order-price">${o.price}</div>
        </div>
        <div class="order-foot">
          ${o.trackingId
            ? `<button class="btn-track" onclick="trackOrder('${o.trackingId}','${o.courierCode||'')}')"">
                <i class="fas fa-map-marker-alt"></i> Track Order
               </button>`
            : `<button class="btn-track" style="opacity:.45;cursor:not-allowed;" disabled>
                <i class="fas fa-clock"></i> Tracking Not Available Yet
               </button>`
          }
          <a href="index.html" class="btn-reorder"><i class="fas fa-redo"></i> Shop Again</a>
        </div>
      </div>`;
    }).join('');
  }

  function trackOrder(trackingId, courierCode) {
    window.location.href = `track.html?id=${encodeURIComponent(trackingId)}&courier=${encodeURIComponent(courierCode)}`;
  }

  loadPage();
</script>
</body>
</html>
